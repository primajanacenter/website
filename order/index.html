<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primajana Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:linear-gradient(135deg,#0d53ff,#00145a);color:#fff}
.container{width:95%;max-width:1600px;margin:auto}
.header{padding:24px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:800}
.badge{background:#ffffff20;padding:8px 14px;border-radius:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:20px;border-radius:22px;border:1px solid rgba(255,255,255,.15)}
.card h3{font-size:13px;opacity:.8}
.card .v{font-size:30px;font-weight:800;margin-top:8px}
.toolbar{display:flex;gap:12px;margin:20px 0}
input{padding:14px;border-radius:14px;border:none;flex:1}
.board{display:flex;gap:18px;overflow-x:auto;padding-bottom:30px}
.column{min-width:320px;background:rgba(255,255,255,.1);border-radius:24px;padding:16px}
.column h2{font-size:18px;margin-bottom:15px}
.order{background:#fff;color:#0f172a;border-radius:18px;padding:14px;margin-bottom:12px}
.order .id{font-size:12px;color:#64748b}
.order .title{font-weight:700;margin:6px 0}
.row{font-size:13px;margin:3px 0}
.deadline{margin-top:10px}
.warn{display:inline-block;background:#ef4444;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px}
.loading{text-align:center;padding:50px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div>
<div class="logo">PRIMAJANA</div>
<div>Work Management Dashboard</div>
</div>
<div class="badge">Live Dashboard</div>
</div>

<div class="kpis">
<div class="card"><h3>Total Order</h3><div class="v" id="totalOrder">0</div></div>
<div class="card"><h3>Order Aktif</h3><div class="v" id="aktif">0</div></div>
<div class="card"><h3>Selesai</h3><div class="v" id="selesai">0</div></div>
<div class="card"><h3>Revenue</h3><div class="v" id="revenue">Rp0</div></div>
<div class="card"><h3>Belum Lunas</h3><div class="v" id="belum">0</div></div>
<div class="card"><h3>DP Berjalan</h3><div class="v" id="dp">0</div></div>
<div class="card"><h3>Deadline Hari Ini</h3><div class="v" id="today">0</div></div>
<div class="card"><h3>Terlambat</h3><div class="v" id="late">0</div></div>
</div>

<div class="toolbar">
<input id="search" placeholder="Cari nomor WA atau jenis order...">
</div>

<div id="loading" class="loading">Memuat data...</div>

<div class="board" id="board" style="display:none">
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby4tiyVFk_bOgCzhWBoD-V5GCznbUKXfa5BEzbRK1f9rm9toYMBeBuVEL5Xtb2NtmRt/exec";

const statuses = [
  "Order Masuk",
  "Menunggu Pembayaran",
  "DP",
  "Dikerjakan",
  "Revisi",
  "Pelunasan",
  "Selesai"
];

const board = document.getElementById("board");

statuses.forEach(status => {

  const col = document.createElement("div");

  col.className = "column";

  col.innerHTML = `
    <h2>${status}</h2>
    <div id="${status.replace(/\s/g,'_')}"></div>
  `;

  board.appendChild(col);

});

function money(value){

  return "Rp " +
    Number(value || 0)
      .toLocaleString("id-ID");

}

function overdue(deadline){

  if(!deadline) return "";

  const d = new Date(deadline);

  const now = new Date();

  const diff =
    Math.floor(
      (now - d) /
      (1000 * 60 * 60 * 24)
    );

  if(diff > 0){

    return `
      <span class="warn">
        TERLAMBAT ${diff} HARI
      </span>
    `;

  }

  if(diff === 0){

    return `
      <span class="today">
        DEADLINE HARI INI
      </span>
    `;

  }

  return "";

}

function paymentBadge(status){

  if(status === "Lunas"){

    return `
      <span class="badge success">
        Lunas
      </span>
    `;

  }

  if(status === "DP"){

    return `
      <span class="badge warning">
        DP
      </span>
    `;

  }

  return `
    <span class="badge danger">
      Belum Bayar
    </span>
  `;

}

async function loadData(){

  try{

    const res = await fetch(API_URL);

    const data = await res.json();

    render(data);

  }catch(err){

    console.error(err);

    document.getElementById("loading").innerHTML =
      "Gagal memuat data";

  }

}

function render(data){

  document.getElementById("loading").style.display = "none";

  board.style.display = "flex";

  statuses.forEach(status => {

    const container =
      document.getElementById(
        status.replace(/\s/g,'_')
      );

    if(container){

      container.innerHTML = "";

    }

  });

  document.getElementById("totalOrder").textContent =
    data.length;

  document.getElementById("aktif").textContent =
    data.filter(
      x => x.status !== "Selesai"
    ).length;

  document.getElementById("selesai").textContent =
    data.filter(
      x => x.status === "Selesai"
    ).length;

  document.getElementById("revenue").textContent =
    money(
      data.reduce(
        (a,b) =>
          a + Number(b.biaya || 0),
        0
      )
    );

  document.getElementById("belum").textContent =
    data.filter(
      x => x.pembayaran === "Belum Bayar"
    ).length;

  document.getElementById("dp").textContent =
    data.filter(
      x => x.pembayaran === "DP"
    ).length;

  data.sort((a,b)=>{

    if(!a.deadline) return 1;

    if(!b.deadline) return -1;

    return new Date(a.deadline)
      - new Date(b.deadline);

  });

  data.forEach(item => {

    const target =
      document.getElementById(
        item.status.replace(/\s/g,'_')
      );

    if(!target) return;

    const card =
      document.createElement("div");

    card.className = "order";

    card.dataset.search =
      `${item.id}
       ${item.wa}
       ${item.jenis}`
      .toLowerCase();

    card.innerHTML = `

      <div class="id">
        ${item.id || "-"}
      </div>

      <div class="title">
        ${item.jenis || "-"}
      </div>

      <div class="row">
        📱 ${item.wa || "-"}
      </div>

      <div class="row">
        ${money(item.biaya)}
      </div>

      <div class="row">
        ${paymentBadge(item.pembayaran)}
      </div>

      <div class="deadline">
        Deadline:
        ${item.deadline || "-"}
      </div>

      ${overdue(item.deadline)}

    `;

    target.appendChild(card);

  });

}

document
.getElementById("search")
.addEventListener("keyup",e=>{

  const q =
    e.target.value.toLowerCase();

  document
  .querySelectorAll(".order")
  .forEach(card=>{

    card.style.display =
      card.dataset.search.includes(q)
      ? "block"
      : "none";

  });

});

loadData();

setInterval(
  loadData,
  60000
);

lucide.createIcons();

</script>

</body>
</html>
