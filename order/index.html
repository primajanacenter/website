<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primajana Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:#f4f7fb;
color:#0f172a;
min-height:100vh;
overflow-x:hidden;
padding-bottom:20px;
}
.container{
width:100%;
padding:20px;
margin:0;
}
.header{
padding:10px 0 20px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{font-size:28px;font-weight:800}
.badge{
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:12px;
font-size:13px;
}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0}
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:
0 4px 15px rgba(0,0,0,.06);
border:1px solid #e5e7eb;
}
.card h3{
font-size:13px;
color:#64748b;
font-weight:500;
}
.card .v{
font-size:28px;
font-weight:700;
margin-top:8px;
color:#0f172a;
}
.toolbar{display:flex;gap:12px;margin:20px 0}
input{
padding:14px 18px;
border-radius:14px;
border:1px solid #dbe3f0;
background:white;
flex:1;
font-size:14px;
}
.board{
display:flex;
gap:18px;
overflow-x:auto;
padding-bottom:30px;
align-items:flex-start;
}
.column{
min-width:320px;
background:white;
border-radius:20px;
padding:16px;
box-shadow:
0 4px 15px rgba(0,0,0,.06);
border:1px solid #e5e7eb;
}
.column h2{font-size:18px;margin-bottom:15px}
.order{background:#fff;color:#0f172a;border-radius:18px;padding:14px;margin-bottom:12px}
.order .id{font-size:12px;color:#64748b}
.order .title{font-weight:700;margin:6px 0}
.row{font-size:13px;margin:3px 0}
.deadline{margin-top:10px}
.warn{display:inline-block;background:#ef4444;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px}
.today{
display:inline-block;
background:#f59e0b;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}

.success{
display:inline-block;
background:#10b981;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}

.warning{
display:inline-block;
background:#f59e0b;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}

.danger{
display:inline-block;
background:#ef4444;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}
.loading{text-align:center;padding:50px}

/* =====================================
MOBILE RESPONSIVE
===================================== */

@media screen and (max-width: 768px){

.container{
padding:12px;
}

/* Header */

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
padding:0 0 15px;
}

.logo{
font-size:24px;
}

.badge{
font-size:12px;
padding:6px 10px;
}

/* KPI */

.kpis{
grid-template-columns:
repeat(2,1fr);
gap:10px;
}

.card{
padding:14px;
border-radius:16px;
}

.card h3{
font-size:12px;
}

.card .v{
font-size:22px;
}

/* Search */

.toolbar{
margin:15px 0;
}

input{
padding:12px;
font-size:14px;
}

/* Trello Board */

.board{
gap:12px;
padding-bottom:20px;
scroll-snap-type:x mandatory;
}

.column{
min-width:280px;
max-width:280px;
padding:12px;
scroll-snap-align:start;
}

.column h2{
font-size:16px;
margin-bottom:10px;
}

.order{
padding:12px;
border-radius:14px;
}

.order .title{
font-size:14px;
}

.row{
font-size:12px;
}

.deadline{
font-size:12px;
}

/* Badge */

.success,
.warning,
.danger,
.warn,
.today{
font-size:10px;
padding:4px 7px;
}

/* Loading */

.loading{
padding:30px 10px;
font-size:14px;
}

}

/* =====================================
SMALL PHONE
===================================== */

@media screen and (max-width:480px){

.kpis{
grid-template-columns:1fr 1fr;
gap:8px;
}

.card{
padding:12px;
}

.card .v{
font-size:18px;
}

.logo{
font-size:20px;
}

.column{
min-width:250px;
max-width:250px;
}

}

</style>
</head>
<body>
<div class="container">
<div class="header">
<div>
<div class="logo">PRIMAJANA</div>
<div>Work Management Dashboard</div>
</div>
<div class="badge">Live Dashboard</div>
</div>

<div class="kpis">
<div class="card"><h3>Total Order</h3><div class="v" id="totalOrder">0</div></div>
<div class="card"><h3>Order Aktif</h3><div class="v" id="aktif">0</div></div>
<div class="card"><h3>Selesai</h3><div class="v" id="selesai">0</div></div>
<div class="card"><h3>Revenue</h3><div class="v" id="revenue">Rp0</div></div>
<div class="card"><h3>Belum Lunas</h3><div class="v" id="belum">0</div></div>
<div class="card"><h3>DP Berjalan</h3><div class="v" id="dp">0</div></div>
<div class="card"><h3>Deadline Hari Ini</h3><div class="v" id="today">0</div></div>
<div class="card"><h3>Terlambat</h3><div class="v" id="late">0</div></div>
</div>

<div class="toolbar">
<input id="search" placeholder="Cari nomor WA atau jenis order...">
</div>

<div id="loading" class="loading">Memuat data...</div>

<div class="board" id="board" style="display:none">
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby4tiyVFk_bOgCzhWBoD-V5GCznbUKXfa5BEzbRK1f9rm9toYMBeBuVEL5Xtb2NtmRt/exec";

const statuses = [
  "Order Masuk",
  "Menunggu Pembayaran",
  "DP",
  "Dikerjakan",
  "Revisi",
  "Pelunasan",
  "Selesai"
];

const board = document.getElementById("board");

board.innerHTML = "";

statuses.forEach(status => {

  const col = document.createElement("div");

  col.className = "column";

  col.innerHTML = `
    <h2>${status}</h2>
    <div id="${status.replace(/\s/g,'_')}"></div>
  `;

  board.appendChild(col);

});

function money(value){

  return "Rp " +
    Number(value || 0)
      .toLocaleString("id-ID");

}

function overdue(deadline){

  if(!deadline) return "";

  const d = new Date(deadline);

  const now = new Date();

  const diff = Math.floor(
    (now - d) /
    (1000 * 60 * 60 * 24)
  );

  if(diff > 0){

    return `
      <span class="warn">
        TERLAMBAT ${diff} HARI
      </span>
    `;

  }

  if(diff === 0){

    return `
      <span class="today">
        DEADLINE HARI INI
      </span>
    `;

  }

  return "";

}

function paymentBadge(status){

  if(status === "Lunas"){

    return `
      <span class="success">
        Lunas
      </span>
    `;

  }

  if(status === "DP"){

    return `
      <span class="warning">
        DP
      </span>
    `;

  }

  return `
    <span class="danger">
      Belum Bayar
    </span>
  `;

}

async function loadData(){

  try{

    const res = await fetch(API_URL);

    const data = await res.json();

    render(data);

  }catch(err){

    console.error(err);

    document.getElementById("loading").innerHTML =
      "Gagal memuat data";

  }

}

function render(data){

  document.getElementById("loading").style.display = "none";

  board.style.display = "flex";

  statuses.forEach(status => {

    const container =
      document.getElementById(
        status.replace(/\s/g,'_')
      );

    if(container){

      container.innerHTML = "";

    }

  });

  document.getElementById("totalOrder").textContent =
    data.length;

  document.getElementById("aktif").textContent =
    data.filter(
      item => item.status !== "Selesai"
    ).length;

  document.getElementById("selesai").textContent =
    data.filter(
      item => item.status === "Selesai"
    ).length;

  document.getElementById("revenue").textContent =
    money(
      data.reduce(
        (a,b)=>
          a + Number(b.biaya || 0),
        0
      )
    );

  document.getElementById("belum").textContent =
    data.filter(
      item =>
      item.pembayaran === "Belum Bayar"
    ).length;

  document.getElementById("dp").textContent =
    data.filter(
      item =>
      item.pembayaran === "DP"
    ).length;

  const todayDate = new Date();

  let todayCount = 0;

  let lateCount = 0;

  data.forEach(item=>{

    if(!item.deadline) return;

    const deadlineDate =
      new Date(item.deadline);

    const diff =
      Math.floor(
        (todayDate - deadlineDate) /
        (1000*60*60*24)
      );

    if(diff === 0){

      todayCount++;

    }

    if(
      diff > 0 &&
      item.status !== "Selesai"
    ){

      lateCount++;

    }

  });

  document.getElementById("today").textContent =
    todayCount;

  document.getElementById("late").textContent =
    lateCount;

  data.sort((a,b)=>{

    if(!a.deadline) return 1;

    if(!b.deadline) return -1;

    return (
      new Date(a.deadline)
      - new Date(b.deadline)
    );

  });

  data.forEach(item => {

    const target =
      document.getElementById(
        item.status.replace(/\s/g,'_')
      );

    if(!target) return;

    const card =
      document.createElement("div");

    card.className = "order";

    card.dataset.search = `
      ${item.id || ""}
      ${item.wa || ""}
      ${item.jenis || ""}
    `.toLowerCase();

    card.innerHTML = `

      <div class="id">
        ${item.id || "-"}
      </div>

      <div class="title">
        ${item.jenis || "-"}
      </div>

      <div class="row">
        📱 ${item.wa || "-"}
      </div>

      <div class="row">
        💰 ${money(item.biaya)}
      </div>

      <div class="row">
        ${paymentBadge(item.pembayaran)}
      </div>

      <div class="deadline">
        Deadline:
        ${item.deadline || "-"}
      </div>

      ${overdue(item.deadline)}

    `;

    target.appendChild(card);

  });

}

document
.getElementById("search")
.addEventListener("keyup",e=>{

  const keyword =
    e.target.value.toLowerCase();

  document
  .querySelectorAll(".order")
  .forEach(card=>{

    card.style.display =
      card.dataset.search.includes(keyword)
      ? "block"
      : "none";

  });

});

loadData();

setInterval(
  loadData,
  60000
);

lucide.createIcons();

</script>


</body>
</html>
