<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primajana - Tracking Pesanan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0d53ff,#00145a);
min-height:100vh;
color:white;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:40px 0;
}

.hero{
text-align:center;
margin-bottom:40px;
}

.hero h1{
font-size:42px;
font-weight:800;
line-height:1.1;
}

.hero p{
opacity:.85;
margin-top:10px;
}

.search-box{
background:rgba(255,255,255,.12);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.15);
padding:20px;
border-radius:20px;
display:flex;
gap:15px;
margin-bottom:25px;
}

.search-box input{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
}

.search-box button{
padding:16px 28px;
border:none;
border-radius:16px;
background:#00d26a;
color:white;
font-weight:700;
cursor:pointer;
}

.results{
display:grid;
gap:18px;
}

.card{
background:white;
color:#0f172a;
border-radius:22px;
padding:22px;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
flex-wrap:wrap;
gap:10px;
}

.order-id{
font-size:14px;
color:#64748b;
}

.title{
font-size:22px;
font-weight:700;
}

.badge{
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.status-order{
background:#dbeafe;
color:#1d4ed8;
}

.status-done{
background:#dcfce7;
color:#166534;
}

.status-payment-lunas{
background:#dcfce7;
color:#166534;
}

.status-payment-dp{
background:#ede9fe;
color:#6d28d9;
}

.status-payment-belum{
background:#fee2e2;
color:#b91c1c;
}

.info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:15px;
}

.box{
background:#f8fafc;
padding:14px;
border-radius:14px;
}

.box small{
display:block;
color:#64748b;
}

.box strong{
display:block;
margin-top:4px;
}

.progress-section{
margin-top:20px;
}

.progress-bar{
height:16px;
background:#e2e8f0;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}

.progress-fill{
height:100%;
background:#0d53ff;
}

.empty{
text-align:center;
padding:50px;
background:rgba(255,255,255,.12);
border-radius:24px;
}

.timeline{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.timeline-item{
background:#f8fafc;
padding:10px 12px;
border-radius:12px;
font-size:13px;
display:flex;
align-items:center;
gap:8px;
}

.timeline-done{
color:#16a34a;
font-weight:700;
}

.timeline-pending{
color:#94a3b8;
font-weight:700;
}

.download-btn{
display:inline-block;
background:#0d53ff;
color:white;
text-decoration:none;
padding:12px 18px;
border-radius:12px;
font-weight:600;
transition:.2s;
}

.download-btn:hover{
background:#0039c7;
}

.footer-note{
margin-top:30px;
text-align:center;
opacity:.75;
}

@media(max-width:768px){

.container{
width:100%;
padding:20px 15px;
}

.hero{
margin-bottom:25px;
}

.hero h1{
font-size:28px;
line-height:1.2;
}

.hero p{
font-size:14px;
padding:0 10px;
}

.search-box{
flex-direction:column;
padding:18px;
gap:12px;
border-radius:18px;
}

.search-box input{
width:100%;
padding:14px;
font-size:16px;
}

.search-box button{
width:100%;
padding:14px;
font-size:15px;
}

.card{
padding:18px;
border-radius:18px;
}

.card-header{
flex-direction:column;
align-items:flex-start;
}

.title{
font-size:18px;
}

.info{
grid-template-columns:1fr;
gap:10px;
}

.box{
padding:12px;
}

.progress-section{
margin-top:15px;
}

.timeline{
display:flex;
flex-direction:column;
gap:8px;
margin-top:18px;
}

.timeline-item{
font-size:13px;
}

.download-btn{
width:100%;
display:block;
text-align:center;
}

.footer-note{
font-size:12px;
padding:0 15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<h1>Cek Status Pesanan Anda</h1>

<p>
Masukkan nomor WhatsApp yang digunakan saat melakukan pemesanan.
</p>

</div>

<div class="search-box">

<input
type="text"
id="waInput"
placeholder="Contoh: 08123456789"
>

<button onclick="searchOrder()">
Lihat Status
</button>

</div>

<div id="results" class="results"></div>

<div class="footer-note">
PT Primajana Bagia Mesari • Tracking Portal
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby4tiyVFk_bOgCzhWBoD-V5GCznbUKXfa5BEzbRK1f9rm9toYMBeBuVEL5Xtb2NtmRt/exec";

let allOrders = [];

async function loadData(){

  try{

    const res =
      await fetch(API_URL);

    allOrders =
      await res.json();

  }catch(err){

    console.error(err);

  }

}

function progressPercent(status){

  const map = {

    "Order Masuk":10,

    "Menunggu Pembayaran":20,

    "DP":35,

    "Dikerjakan":60,

    "Revisi":80,

    "Pelunasan":90,

    "Selesai":100

  };

  return map[status] || 0;

}

function paymentBadge(status){

  if(status === "Lunas"){

    return "status-payment-lunas";

  }

  if(status === "DP"){

    return "status-payment-dp";

  }

  return "status-payment-belum";

}

function generateTimeline(status){

  const steps = [

    "Order Masuk",

    "Menunggu Pembayaran",

    "DP",

    "Dikerjakan",

    "Revisi",

    "Pelunasan",

    "Selesai"

  ];

  const current =
    steps.indexOf(status);

  return steps.map((step,index)=>`

    <div class="timeline-item">

      <span class="${
        index <= current
          ? "timeline-done"
          : "timeline-pending"
      }">

        ${index <= current ? "✓" : "○"}

      </span>

      ${step}

    </div>

  `).join("");

}

function searchOrder(){

  const wa =
    document
      .getElementById("waInput")
      .value
      .trim();

  const results =
    document
      .getElementById("results");

  results.innerHTML = "";

  if(!wa){

    results.innerHTML = `
      <div class="empty">
        <h3>
          Masukkan Nomor WhatsApp
        </h3>
      </div>
    `;

    return;

  }

  const orders =
    allOrders.filter(
      item =>
      item.wa === wa
    );

  if(orders.length === 0){

    results.innerHTML = `
      <div class="empty">

        <h3>
          Pesanan Tidak Ditemukan
        </h3>

        <p>

          Nomor WhatsApp tidak ditemukan
          dalam sistem.

        </p>

      </div>
    `;

    return;

  }

  orders.forEach(order=>{

    const progress =
      progressPercent(
        order.status
      );

    results.innerHTML += `

      <div class="card">

        <div class="card-header">

          <div>

            <div class="order-id">

              ${order.id || "-"}

            </div>

            <div class="title">

              ${order.jenis || "-"}

            </div>

          </div>

          <div>

            <span class="badge ${
              order.status === "Selesai"
                ? "status-done"
                : "status-order"
            }">

              ${order.status || "-"}

            </span>

          </div>

        </div>

        <div class="info">

          <div class="box">

            <small>
              Nomor WhatsApp
            </small>

            <strong>
              ${order.wa || "-"}
            </strong>

          </div>

          <div class="box">

            <small>
              Status Pembayaran
            </small>

            <strong>

              <span class="badge ${paymentBadge(order.pembayaran)}">

                ${order.pembayaran || "-"}

              </span>

            </strong>

          </div>

          <div class="box">

            <small>
              Deadline
            </small>

            <strong>

              ${order.deadline || "-"}

            </strong>

          </div>

          <div class="box">

            <small>
              Biaya
            </small>

            <strong>

              Rp ${Number(
                order.biaya || 0
              ).toLocaleString("id-ID")}

            </strong>

          </div>

        </div>

        <div class="progress-section">

          <div>

            Progress Pengerjaan

          </div>

          <div class="progress-bar">

            <div
              class="progress-fill"
              style="width:${progress}%"
            ></div>

          </div>

          <div style="margin-top:6px;font-size:13px;">

            ${progress}% selesai

          </div>

        </div>

        <div class="timeline">

          ${generateTimeline(
            order.status
          )}

        </div>

        ${
          order.link

          ? `

          <div style="margin-top:15px;">

            <a
              href="${order.link}"
              target="_blank"
              class="download-btn"
            >

              Lihat / Download Hasil

            </a>

          </div>

          `

          : ""

        }

        ${
          order.tanggal_selesai

          ? `

          <div style="margin-top:10px;">

            <small>

              Tanggal Selesai:
              ${order.tanggal_selesai}

            </small>

          </div>

          `

          : ""

        }

      </div>

    `;

  });

}

document
.getElementById("waInput")
.addEventListener(
  "keypress",
  e=>{

    if(e.key === "Enter"){

      searchOrder();

    }

  }
);

loadData();

setInterval(
  loadData,
  60000
);

</script>


</body>
</html>
