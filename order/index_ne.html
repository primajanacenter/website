<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primajana Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:#f4f7fb;
color:#0f172a;
min-height:100vh;
overflow-x:hidden;
padding-bottom:20px;
}
.container{
width:100%;
padding:20px;
margin:0;
}
.header{
padding:10px 0 20px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{font-size:28px;font-weight:800}
.badge{
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:12px;
font-size:13px;
}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0}
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:
0 4px 15px rgba(0,0,0,.06);
border:1px solid #e5e7eb;
}
.card h3{
font-size:13px;
color:#64748b;
font-weight:500;
}
.card .v{
font-size:28px;
font-weight:700;
margin-top:8px;
color:#0f172a;
}
.toolbar{display:flex;gap:12px;margin:20px 0}
input{
padding:14px 18px;
border-radius:14px;
border:1px solid #dbe3f0;
background:white;
flex:1;
font-size:14px;
}
.board{
display:flex;
gap:18px;
overflow-x:auto;
padding-bottom:30px;
align-items:flex-start;
}
.column{
min-width:320px;
background:white;
border-radius:20px;
padding:16px;
box-shadow:
0 4px 15px rgba(0,0,0,.06);
border:1px solid #e5e7eb;
}
.column h2{font-size:18px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.column .count{
font-size:12px;
font-weight:600;
color:#64748b;
background:#f1f5f9;
padding:2px 9px;
border-radius:999px;
}
.column-body{min-height:20px}
.order{background:#fff;color:#0f172a;border-radius:18px;padding:14px;margin-bottom:12px;border:1px solid #eef1f6;transition:opacity .15s ease}
.order.saving{opacity:.55;pointer-events:none}
.order .id{font-size:12px;color:#64748b}
.order .title{font-weight:700;margin:6px 0}
.row{font-size:13px;margin:3px 0}
.deadline{margin-top:10px;font-size:13px;color:#334155}
.urgency-overdue{display:inline-block;background:#7f1d1d;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px;margin-top:6px}
.urgency-critical{display:inline-block;background:#ef4444;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px;margin-top:6px}
.urgency-soon{display:inline-block;background:#f59e0b;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px;margin-top:6px}
.urgency-safe{display:inline-block;background:#10b981;color:#fff;padding:4px 8px;border-radius:999px;font-size:11px;margin-top:6px}

.success{
display:inline-block;
background:#10b981;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}

.warning{
display:inline-block;
background:#f59e0b;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}

.danger{
display:inline-block;
background:#ef4444;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
}
.loading{text-align:center;padding:50px}

/* Status dropdown (Notion/Trello-style status chip) */
.status-select-wrap{position:relative;margin:8px 0}
.status-select{
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
width:100%;
border:none;
cursor:pointer;
padding:8px 30px 8px 12px;
border-radius:10px;
font-size:12px;
font-weight:600;
color:#fff;
background-repeat:no-repeat;
background-position:right 10px center;
background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='white' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
}
.status-select option{color:#0f172a;background:#fff;font-weight:500}
.status-Order_Masuk{background-color:#64748b}
.status-Menunggu_Pembayaran{background-color:#f59e0b}
.status-DP{background-color:#3b82f6}
.status-Dikerjakan{background-color:#6366f1}
.status-Revisi{background-color:#ec4899}
.status-Pelunasan{background-color:#14b8a6}
.status-Selesai{background-color:#10b981}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0f172a;
color:#fff;
padding:12px 20px;
border-radius:12px;
font-size:13px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
z-index:999;
opacity:0;
pointer-events:none;
transition:opacity .2s ease;
}
.toast.show{opacity:1}
.toast.error{background:#7f1d1d}

/* =====================================
MOBILE RESPONSIVE
===================================== */

@media screen and (max-width: 768px){

.container{
padding:12px;
}

/* Header */

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
padding:0 0 15px;
}

.logo{
font-size:24px;
}

.badge{
font-size:12px;
padding:6px 10px;
}

/* KPI */

.kpis{
grid-template-columns:
repeat(2,1fr);
gap:10px;
}

.card{
padding:14px;
border-radius:16px;
}

.card h3{
font-size:12px;
}

.card .v{
font-size:22px;
}

/* Search */

.toolbar{
margin:15px 0;
}

input{
padding:12px;
font-size:14px;
}

/* Trello Board */

.board{
gap:12px;
padding-bottom:20px;
scroll-snap-type:x mandatory;
}

.column{
min-width:280px;
max-width:280px;
padding:12px;
scroll-snap-align:start;
}

.column h2{
font-size:16px;
margin-bottom:10px;
}

.order{
padding:12px;
border-radius:14px;
}

.order .title{
font-size:14px;
}

.row{
font-size:12px;
}

.deadline{
font-size:12px;
}

/* Badge */

.success,
.warning,
.danger,
.urgency-overdue,
.urgency-critical,
.urgency-soon,
.urgency-safe{
font-size:10px;
padding:4px 7px;
}

/* Loading */

.loading{
padding:30px 10px;
font-size:14px;
}

}

/* =====================================
SMALL PHONE
===================================== */

@media screen and (max-width:480px){

.kpis{
grid-template-columns:1fr 1fr;
gap:8px;
}

.card{
padding:12px;
}

.card .v{
font-size:18px;
}

.logo{
font-size:20px;
}

.column{
min-width:250px;
max-width:250px;
}

}

</style>
</head>
<body>
<div class="container">
<div class="header">
<div>
<div class="logo">PRIMAJANA</div>
<div>Work Management Dashboard</div>
</div>
<div class="badge">Live Dashboard</div>
</div>

<div class="kpis">
<div class="card"><h3>Total Order</h3><div class="v" id="totalOrder">0</div></div>
<div class="card"><h3>Order Aktif</h3><div class="v" id="aktif">0</div></div>
<div class="card"><h3>Selesai</h3><div class="v" id="selesai">0</div></div>
<div class="card"><h3>Revenue</h3><div class="v" id="revenue">Rp0</div></div>
<div class="card"><h3>Belum Lunas</h3><div class="v" id="belum">0</div></div>
<div class="card"><h3>DP Berjalan</h3><div class="v" id="dp">0</div></div>
<div class="card"><h3>Deadline Hari Ini</h3><div class="v" id="today">0</div></div>
<div class="card"><h3>Terlambat</h3><div class="v" id="late">0</div></div>
</div>

<div class="toolbar">
<input id="search" placeholder="Cari nomor WA atau jenis order...">
</div>

<div id="loading" class="loading">Memuat data...</div>

<div class="board" id="board" style="display:none">
</div>
</div>

<div class="toast" id="toast"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby4tiyVFk_bOgCzhWBoD-V5GCznbUKXfa5BEzbRK1f9rm9toYMBeBuVEL5Xtb2NtmRt/exec";

const statuses = [
  "Order Masuk",
  "Menunggu Pembayaran",
  "DP",
  "Dikerjakan",
  "Revisi",
  "Pelunasan",
  "Selesai"
];

const board = document.getElementById("board");
const toastEl = document.getElementById("toast");

let allData = [];
let searchTerm = "";
let refreshTimer = null;

board.innerHTML = "";

statuses.forEach(status => {

  const col = document.createElement("div");

  col.className = "column";

  col.innerHTML = `
    <h2>${status} <span class="count" id="count_${status.replace(/\s/g,'_')}">0</span></h2>
    <div class="column-body" id="${status.replace(/\s/g,'_')}"></div>
  `;

  board.appendChild(col);

});

function slug(status){
  return status.replace(/\s/g,'_');
}

function showToast(msg, isError){
  toastEl.textContent = msg;
  toastEl.className = "toast show" + (isError ? " error" : "");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>{
    toastEl.className = "toast";
  }, 3000);
}

function money(value){

  return "Rp " +
    Number(value || 0)
      .toLocaleString("id-ID");

}

// Badge Urgency: menggantikan badge "Terlambat" lama.
// Kategori:
//   Terlambat  -> sudah lewat deadline
//   Kritis     -> hari ini / besok (0-1 hari lagi)
//   Segera     -> 2-3 hari lagi
//   Aman       -> lebih dari 3 hari lagi
// Order dengan status "Selesai" tidak diberi badge urgency.
function urgencyBadge(deadline, status){

  if(status === "Selesai") return "";

  if(!deadline) return "";

  const d = new Date(deadline);

  if(isNaN(d.getTime())) return "";

  const now = new Date();

  const diff = Math.floor(
    (now - d) /
    (1000 * 60 * 60 * 24)
  );

  if(diff > 0){
    return `<span class="urgency-overdue">TERLAMBAT ${diff} HARI</span>`;
  }

  const daysLeft = -diff;

  if(daysLeft <= 1){
    return `<span class="urgency-critical">KRITIS ${daysLeft === 0 ? "· HARI INI" : "· BESOK"}</span>`;
  }

  if(daysLeft <= 3){
    return `<span class="urgency-soon">SEGERA · ${daysLeft} HARI LAGI</span>`;
  }

  return `<span class="urgency-safe">AMAN · ${daysLeft} HARI LAGI</span>`;

}

function paymentBadge(status){

  if(status === "Lunas"){

    return `
      <span class="success">
        Lunas
      </span>
    `;

  }

  if(status === "DP"){

    return `
      <span class="warning">
        DP
      </span>
    `;

  }

  return `
    <span class="danger">
      Belum Bayar
    </span>
  `;

}

function statusSelect(item){

  const options = statuses.map(s => `
    <option value="${s}" ${s === item.status ? "selected" : ""}>${s}</option>
  `).join("");

  return `
    <div class="status-select-wrap">
      <select class="status-select status-${slug(item.status)}" data-id="${item.id}">
        ${options}
      </select>
    </div>
  `;

}

async function loadData(){

  try{

    const res = await fetch(API_URL);

    const data = await res.json();

    allData = data;

    render(allData);

  }catch(err){

    console.error(err);

    document.getElementById("loading").innerHTML =
      "Gagal memuat data";

  }

}

function render(data){

  document.getElementById("loading").style.display = "none";

  board.style.display = "flex";

  const counts = {};

  statuses.forEach(status => {

    const container =
      document.getElementById(
        slug(status)
      );

    if(container){

      container.innerHTML = "";

    }

    counts[status] = 0;

  });

  document.getElementById("totalOrder").textContent =
    data.length;

  document.getElementById("aktif").textContent =
    data.filter(
      item => item.status !== "Selesai"
    ).length;

  document.getElementById("selesai").textContent =
    data.filter(
      item => item.status === "Selesai"
    ).length;

  document.getElementById("revenue").textContent =
    money(
      data.reduce(
        (a,b)=>
          a + Number(b.biaya || 0),
        0
      )
    );

  document.getElementById("belum").textContent =
    data.filter(
      item =>
      item.pembayaran === "Belum Bayar"
    ).length;

  document.getElementById("dp").textContent =
    data.filter(
      item =>
      item.pembayaran === "DP"
    ).length;

  const todayDate = new Date();

  let todayCount = 0;

  let lateCount = 0;

  data.forEach(item=>{

    if(!item.deadline) return;

    const deadlineDate =
      new Date(item.deadline);

    const diff =
      Math.floor(
        (todayDate - deadlineDate) /
        (1000*60*60*24)
      );

    if(diff === 0){

      todayCount++;

    }

    if(
      diff > 0 &&
      item.status !== "Selesai"
    ){

      lateCount++;

    }

  });

  document.getElementById("today").textContent =
    todayCount;

  document.getElementById("late").textContent =
    lateCount;

  data.sort((a,b)=>{

    if(!a.deadline) return 1;

    if(!b.deadline) return -1;

    return (
      new Date(a.deadline)
      - new Date(b.deadline)
    );

  });

  data.forEach(item => {

    const target =
      document.getElementById(
        slug(item.status)
      );

    if(!target) return;

    counts[item.status] = (counts[item.status] || 0) + 1;

    const card =
      document.createElement("div");

    card.className = "order";
    card.dataset.id = item.id;

    card.dataset.search = `
      ${item.id || ""}
      ${item.wa || ""}
      ${item.jenis || ""}
    `.toLowerCase();

    card.innerHTML = `

      <div class="id">
        ${item.id || "-"}
      </div>

      <div class="title">
        ${item.jenis || "-"}
      </div>

      ${statusSelect(item)}

      <div class="row">
        📱 ${item.wa || "-"}
      </div>

      <div class="row">
        💰 ${money(item.biaya)}
      </div>

      <div class="row">
        ${paymentBadge(item.pembayaran)}
      </div>

      <div class="deadline">
        Deadline:
        ${item.deadline || "-"}
      </div>

      ${urgencyBadge(item.deadline, item.status)}

    `;

    if(searchTerm && !card.dataset.search.includes(searchTerm)){
      card.style.display = "none";
    }

    target.appendChild(card);

  });

  statuses.forEach(status => {
    const countEl = document.getElementById("count_" + slug(status));
    if(countEl) countEl.textContent = counts[status] || 0;
  });

  board.querySelectorAll(".status-select").forEach(sel => {
    sel.addEventListener("change", onStatusChange);
  });

}

async function onStatusChange(e){

  const select = e.target;
  const id = select.dataset.id;
  const newStatus = select.value;

  const item = allData.find(d => String(d.id) === String(id));

  if(!item) return;

  const oldStatus = item.status;

  if(oldStatus === newStatus) return;

  const card = select.closest(".order");
  if(card) card.classList.add("saving");

  item.status = newStatus;

  render(allData);

  try{

    await updateStatusRemote(id, newStatus);

    showToast(`Status "${item.jenis || id}" diubah ke "${newStatus}"`);

  }catch(err){

    console.error(err);

    item.status = oldStatus;

    render(allData);

    showToast("Gagal menyimpan status ke server. Perubahan dikembalikan.", true);

  }

}

async function updateStatusRemote(id, status){

  // Dikirim sebagai text/plain agar tidak memicu CORS preflight
  // (Apps Script Web App tidak mendukung metode OPTIONS).
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({
      action: "updateStatus",
      id: id,
      status: status
    })
  });

  if(!res.ok){
    throw new Error("HTTP " + res.status);
  }

  let result = {};

  try{
    result = await res.json();
  }catch(e){
    // biarkan kosong jika response bukan JSON
  }

  if(result && result.ok === false){
    throw new Error(result.error || "Update gagal");
  }

  return result;

}

document
.getElementById("search")
.addEventListener("keyup",e=>{

  searchTerm = e.target.value.toLowerCase();

  document
  .querySelectorAll(".order")
  .forEach(card=>{

    card.style.display =
      card.dataset.search.includes(searchTerm)
      ? "block"
      : "none";

  });

});

loadData();

refreshTimer = setInterval(
  loadData,
  60000
);

lucide.createIcons();

</script>


</body>
</html>
