<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katalog Buku – Primajana Press</title>
<meta name="description" content="Katalog resmi buku Primajana Press">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#0d3b66;
  --green:#16a34a;
  --bg:#f5f7fb;
  --card:#fff;
  --text:#1f2937;
  --muted:#6b7280;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
  color:var(--text);
}

header{
  background:#ffffffcc;
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:99;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.header-wrap{
  max-width:1200px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  gap:12px;
  align-items:center;
}

.brand img{
  height:42px;
}

.brand strong{
  color:var(--primary);
}

.stats{
  font-size:14px;
  color:var(--muted);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:35px 20px;
}

.hero h1{
  color:var(--primary);
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);
}

.toolbar{
  margin:25px 0;
  display:grid;
  grid-template-columns:1fr 180px;
  gap:12px;
}

.toolbar input,.toolbar select{
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:24px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.cover-wrap{
  text-align:center;
}

.card img{
  width:145px;
  height:220px;
  object-fit:cover;
  border-radius:8px;
  box-shadow:-10px 12px 20px rgba(0,0,0,.18);
}

.badge{
  display:inline-block;
  margin-top:10px;
  background:#dcfce7;
  color:#166534;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.card h3{
  font-size:16px;
  color:var(--primary);
  margin:12px 0 8px;
  min-height:48px;
}

.author{
  font-size:13px;
  color:var(--muted);
  margin-bottom:10px;
}

.desc{
  font-size:13px;
  line-height:1.5;
  color:#444;
  min-height:62px;
}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
}

.btn-outline{
  border:1px solid #ddd;
  color:var(--primary);
}

.btn-primary{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
}

.loader,.empty{
  text-align:center;
  padding:50px;
  color:#666;
}

@media(max-width:900px){
  .toolbar{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
<div class="header-wrap">
  <div class="brand">
    <img src="https://res.cloudinary.com/djexglfns/image/upload/v1754976459/WhatsApp_Image_2025-08-12_at_1.15.37_PM-removebg-preview_ipix4s.png">
    <strong>Primajana Press</strong>
  </div>
  <div class="stats" id="stats">Memuat...</div>
</div>
</header>

<div class="container">

<div class="hero">
<h1>Katalog Buku Primajana Press</h1>
<p>Temukan buku terbaik kami.</p>
</div>

<div class="toolbar">
<input id="search" placeholder="Cari judul / penulis">
<select id="sort">
<option value="az">A-Z</option>
<option value="za">Z-A</option>
</select>
</div>

<div class="grid" id="bookList">
<div class="loader">Loading...</div>
</div>

</div>

<script>
const BOOKS = [
{
id:"yHVVEQAAQBAJ",
title:"33 Teknik Membuat Ide dan Contohnya",
author:"Primajana Education"
},
{
id:"Vw-HEQAAQBAJ",
title:"Residu Antibiotik pada Produk Unggas",
author:"I Made Subrata, dkk."
},
{
id:"-JDEEQAAQBAJ",
title:"Surveilans Kesehatan Wisata",
author:"I Md Ady Wirawan"
}
];

const list = document.getElementById("bookList");
const stats = document.getElementById("stats");
const search = document.getElementById("search");
const sortEl = document.getElementById("sort");

render();

function render(){

let data = [...BOOKS];

const q = search.value.toLowerCase();

if(q){
data = data.filter(b =>
b.title.toLowerCase().includes(q) ||
b.author.toLowerCase().includes(q)
);
}

if(sortEl.value=="az"){
data.sort((a,b)=>a.title.localeCompare(b.title));
}

if(sortEl.value=="za"){
data.sort((a,b)=>b.title.localeCompare(a.title));
}

stats.innerHTML = data.length + " buku tersedia";

list.innerHTML = data.map(card).join("");
}

function card(b){

return `
<div class="card">

<div class="cover-wrap">
<img src="https://books.google.co.id/books/publisher/content/images/frontcover/${b.id}?fife=w300-h450"
onerror="this.src='https://via.placeholder.com/150x220?text=No+Cover'">

<div class="badge">Primajana</div>
</div>

<h3>${b.title}</h3>
<div class="author">${b.author}</div>
<div class="desc">Buku tersedia di Google Play Books.</div>

<div class="actions">
<a class="btn btn-outline" target="_blank"
href="https://books.google.com/books?id=${b.id}">
Preview
</a>

<a class="btn btn-primary" target="_blank"
href="https://play.google.com/store/books/details?id=${b.id}">
Pesan
</a>
</div>

</div>
`;
}

search.addEventListener("input",render);
sortEl.addEventListener("change",render);
</script>

</body>
</html>
